<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Project</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 760px;
      padding: 40px;
      border-radius: 24px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 42px;
    }

    h2 {
      margin: 0 0 20px;
      font-weight: normal;
      opacity: 0.9;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      opacity: 0.95;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-top: 28px;
    }

    .btn {
      display: inline-block;
      padding: 14px 26px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 17px;
      color: white;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Мещерякова Анастасія</h1>
    <h2>Група ІМ-25</h2>

    <p>
      AR-проєкт з трьома власними маркерами, трьома геометріями Three.js,
      текстурами та анімацією.
    </p>

    <div class="buttons">
      <a class="btn" href="camera.html">Перевірка камери</a>
      <a class="btn" href="ar.html">Відкрити AR-сцену</a>
      <a class="btn" href="targets/mic.png" target="_blank">Маркер 1</a>
      <a class="btn" href="targets/angel-comb.png" target="_blank">Маркер 2</a>
      <a class="btn" href="targets/pixel-cats.png" target="_blank">Маркер 3</a>
      <a class="btn" href="targets/multi.mind" target="_blank">Файл .mind</a>
    </div>

    <footer>
      2026 © AR Marker Project
    </footer>
  </div>
</body>
</html>
