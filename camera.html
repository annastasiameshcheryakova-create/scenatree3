<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Перевірка камери</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0;
      font-size: 30px;
    }

    p {
      margin: 0;
      text-align: center;
      max-width: 760px;
      line-height: 1.5;
      opacity: 0.9;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button, a {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      text-decoration: none;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    video {
      width: min(92vw, 900px);
      height: auto;
      max-height: 65vh;
      background: black;
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    .status {
      min-height: 22px;
      font-size: 15px;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Перевірка камери</h1>
    <p>
      Натисни кнопку нижче. Якщо все добре, браузер попросить доступ до камери,
      і зображення з камери з’явиться на екрані.
    </p>

    <div class="buttons">
      <button id="startCamera">Увімкнути камеру</button>
      <button id="stopCamera" disabled>Вимкнути камеру</button>
      <a href="index.html">На головну</a>
    </div>

    <div id="status" class="status">Статус: очікування</div>

    <video id="video" autoplay muted playsinline></video>
  </div>

  <script>
    const startButton = document.getElementById("startCamera");
    const stopButton = document.getElementById("stopCamera");
    const video = document.getElementById("video");
    const status = document.getElementById("status");

    let stream = null;

    async function startCamera() {
      try {
        status.textContent = "Статус: запит доступу до камери...";

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            facingMode: "environment"
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        status.textContent = "Статус: камера увімкнена ✅";
        startButton.disabled = true;
        stopButton.disabled = false;
      } catch (error) {
        console.error(error);
        status.textContent = "Статус: помилка запуску камери ❌";
        alert(
          "Не вдалося відкрити камеру.\n\n" +
          "Перевір:\n" +
          "1. Чи відкрито сайт через HTTPS / GitHub Pages\n" +
          "2. Чи дозволена камера в браузері\n" +
          "3. Чи не зайнята камера іншою програмою"
        );
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      video.pause();
      video.srcObject = null;

      status.textContent = "Статус: камера вимкнена";
      startButton.disabled = false;
      stopButton.disabled = true;
    }

    startButton.addEventListener("click", startCamera);
    stopButton.addEventListener("click", stopCamera);
  </script>
</body>
</html>
