<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #111827, #0f172a);
      color: white;
      padding: 24px;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    h1 { margin-top: 0; }
    .hero {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 24px;
      padding: 20px;
      background: rgba(255,255,255,.04);
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }
    .card {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255,255,255,.04);
    }
    .card img { width: 100%; height: 260px; object-fit: cover; display: block; }
    .card .body { padding: 14px; }
    .pill { display:inline-block; padding: 6px 10px; border-radius: 999px; background: rgba(192,132,252,.2); margin-bottom: 8px; }
    a { color: #67e8f9; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="pill" id="markerName">marker</div>
      <h1>Попередній перегляд текстур сцени</h1>
      <p id="markerDescription"></p>
      <p><a id="backLink" href="index.html">← Назад до вибору маркера</a> · <a id="arLink" href="ar.html">Відкрити AR-сцену</a></p>
    </section>
    <section class="grid" id="previewGrid"></section>
  </div>
  <script>
    const CONFIG = {
      "angel-comb": {
        title: "Angel Comb",
        description: "Головна текстура — фото янгола. Додаткові — GitHub і довільна web-текстура.",
        preview: [
          ["Фото янгола", "assets/textures/angel-photo.png"],
          ["GitHub texture", "assets/textures/github-texture.jpg"],
          ["Web texture", "assets/textures/web-texture.png"]
        ]
      },
      "mic": {
        title: "Mic",
        description: "Головна текстура — котик біля мікрофона. Додаткові — GitHub і довільна web-текстура.",
        preview: [
          ["Котик біля мікрофона", "assets/textures/mic-cat.png"],
          ["GitHub texture", "assets/textures/github-texture.jpg"],
          ["Web texture", "assets/textures/web-texture.png"]
        ]
      },
      "pixel-cats": {
        title: "Pixel Cats",
        description: "Головна текстура — друга картинка для маркера pixel-cats. Додаткові — GitHub і довільна web-текстура.",
        preview: [
          ["Sleeping girl", "assets/textures/sleeping-girl.png"],
          ["GitHub texture", "assets/textures/github-texture.jpg"],
          ["Web texture", "assets/textures/web-texture.png"]
        ]
      }
    };
    const marker = new URLSearchParams(location.search).get('marker') || 'angel-comb';
    const current = CONFIG[marker] || CONFIG['angel-comb'];
    document.getElementById('markerName').textContent = current.title;
    document.getElementById('markerDescription').textContent = current.description;
    document.getElementById('arLink').href = `ar.html?marker=${marker}`;
    const grid = document.getElementById('previewGrid');
    current.preview.forEach(([title, src]) => {
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `<img src="${src}" alt="${title}"><div class="body"><strong>${title}</strong></div>`;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
